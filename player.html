<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; }
    iframe { width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>
<script>
  const p = new URLSearchParams(location.search);
  const v = p.get('v');
  const t = p.get('t') || '0';
  let player = null;

  if (v) {
    const iframe = document.createElement('iframe');
    iframe.id = 'yt';
    iframe.src = `https://www.youtube-nocookie.com/embed/${v}?start=${t}&autoplay=1&enablejsapi=1`;
    iframe.allow = 'autoplay; encrypted-media';
    document.body.appendChild(iframe);

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('yt', {
        events: { onReady: () => {} }
      });
    };
  }

  window.addEventListener('message', e => {
    if (!player) return;
    if (e.data?.type === 'yt-bm-seek') {
      player.seekTo(e.data.t, true);
      player.playVideo();
    }
    if (e.data?.type === 'yt-bm-nudge') {
      const cur = player.getCurrentTime() || 0;
      player.seekTo(cur + e.data.delta, true);
      player.playVideo();
    }
    if (e.data?.type === 'yt-bm-toggle') {
      const state = player.getPlayerState();
      state === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      const delta = e.key === 'ArrowLeft' ? -5 : 5;
      if (player?.getCurrentTime) {
        player.seekTo((player.getCurrentTime() || 0) + delta, true);
        player.playVideo();
      }
    }
  });
</script>
</body>
</html>
