<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yt-player</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #p { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="p"></div>
<script>
/* ============================================================================
 * Suichan Bookmarker 用 埋め込みプレイヤー（中継ホスト）
 *   親（youtube.com 上のユーザースクリプト）から postMessage で制御し、
 *   状態（再生位置など）を親へ postMessage で送り返す。
 *
 * クエリ:  ?v=<videoId>&t=<秒(小数可)>&mute=1
 *
 * 受信メッセージ（親 → このページ）:
 *   { type:'yt-bm-toggle' }              再生/一時停止トグル（DECKミニプレイヤー用・従来）
 *   { type:'yt-bm-seek',  t:<秒> }       絶対シーク（★小数秒対応。同期はこれを多用）
 *   { type:'yt-bm-nudge', delta:<秒> }   相対シーク（DECK用・従来。±5等。小数可）
 *   { type:'yt-bm-play' }                明示再生        （★同期用・新規）
 *   { type:'yt-bm-pause' }               明示一時停止    （★同期用・新規）
 *   { type:'yt-bm-rate',  rate:<倍率> }  再生速度        （★同期用・新規。離散値）
 *   { type:'yt-bm-mute',  on:<bool> }    ミュート/解除   （★同期用・新規）
 *
 * 送信メッセージ（このページ → 親）: 250ms ごと＋状態変化時
 *   { type:'yt-bm-state', t, paused, buffering, duration, rate }
 *     ※非機微情報なので targetOrigin は '*'。安全境界は親側の origin/source 検証で担保。
 * ========================================================================== */
(function () {
  var q     = new URLSearchParams(location.search);
  var VIDEO = q.get('v') || '';
  var START = parseFloat(q.get('t')); if (!isFinite(START) || START < 0) START = 0;
  var MUTED = q.get('mute') === '1';

  var player = null;
  var ready  = false;

  // YouTube IFrame Player API をロード
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  // API 準備完了 → プレイヤー生成
  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player('p', {
      width: '100%',
      height: '100%',
      videoId: VIDEO,
      // ★152-4（不正な埋め込み元）回避: nocookie ホストから読む。
      host: 'https://www.youtube-nocookie.com',
      playerVars: {
        autoplay: 1,
        start: Math.floor(START),
        playsinline: 1,
        rel: 0,
        modestbranding: 1,
        controls: 1
      },
      events: {
        onReady: function (e) {
          ready = true;
          if (MUTED) { try { e.target.mute(); } catch (_) {} }
          // 小数秒の頭出しは playerVars.start（整数）では足りないので seekTo で補正。
          if (START > 0) { try { e.target.seekTo(START, true); } catch (_) {} }
          postState();
        },
        onStateChange: function () { postState(); }
      }
    });
  };

  // 親へ現在状態を送る
  function postState() {
    if (!player || !ready || !player.getPlayerState) return;
    try {
      var st = player.getPlayerState(); // -1:未開始 0:終了 1:再生 2:停止 3:バッファ 5:cued
      parent.postMessage({
        type: 'yt-bm-state',
        t: player.getCurrentTime(),
        paused: (st !== YT.PlayerState.PLAYING),
        buffering: (st === YT.PlayerState.BUFFERING),
        duration: player.getDuration(),
        rate: player.getPlaybackRate()
      }, '*');
    } catch (_) {}
  }
  setInterval(postState, 250);

  // 親からの制御を受ける
  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || !d.type || !player || !ready) return;
    try {
      switch (d.type) {
        case 'yt-bm-play':
          player.playVideo();
          break;
        case 'yt-bm-pause':
          player.pauseVideo();
          break;
        case 'yt-bm-toggle':
          if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
          else player.playVideo();
          break;
        case 'yt-bm-seek':
          player.seekTo(Number(d.t) || 0, true);   // ★floor しない（小数秒のまま）
          break;
        case 'yt-bm-nudge':
          player.seekTo(player.getCurrentTime() + (Number(d.delta) || 0), true);
          break;
        case 'yt-bm-rate':
          player.setPlaybackRate(Number(d.rate) || 1);
          break;
        case 'yt-bm-mute':
          if (d.on) player.mute(); else player.unMute();
          break;
      }
    } catch (_) {}
  });
})();
</script>
</body>
</html>
